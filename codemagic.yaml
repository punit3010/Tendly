workflows:
  tendly-android:
    name: Tendly — Android Debug Build
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      groups:
        - Tendly
    scripts:
      - name: Set up Flutter project
        script: |
          cd tendly_clean
          flutter create --project-name tendly --org com.tendly.app .
          flutter pub get

      - name: Inject API keys
        script: |
          cat > tendly_clean/lib/config/keys.dart << DART
          class AppKeys {
            static const claudeApiKey     = '$Claude_API_KEY';
            static const supabaseAnonKey  = '$SUPABASE_ANON_KEY';
            static const revenueCatGoogle = '$REVENUECAT_GOOGLE_KEY';
          }
          DART

      - name: Build Android APK
        script: |
          cd tendly_clean
          flutter build apk --debug

    artifacts:
      - tendly_clean/build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - punitjrt@gmail.com
        notify:
          success: true
          failure: true
