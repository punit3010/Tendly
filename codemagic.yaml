workflows:
  tendly-android:
    name: Tendly — Android Debug Build
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      groups:
        - Tendly
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Inject API keys
        script: |
          mkdir -p lib/config
          cat > lib/config/keys.dart << DART
          class AppKeys {
            static const claudeApiKey     = '$Claude_API_KEY';
            static const supabaseAnonKey  = '$SUPABASE_ANON_KEY';
            static const revenueCatGoogle = '$REVENUECAT_GOOGLE_KEY';
          }
          DART
      - name: Build Android APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
    publishing:
      email:
        recipients:
          - punitjrt@gmail.com
        notify:
          success: true
          failure: true
